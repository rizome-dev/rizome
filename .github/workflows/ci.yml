name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24.0'

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v3
      with:
        version: latest
        args: --timeout=5m

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        go: ['1.24.0']
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go }}

    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Download dependencies
      run: go mod download

    - name: Run tests
      run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.out
        flags: unittests
        name: codecov-umbrella

  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ['1.24.0']
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go }}

    - name: Build binary
      run: go build -v ./cmd/rizome

    - name: Test binary
      shell: bash
      run: |
        if [ "${{ runner.os }}" == "Windows" ]; then
          ./rizome.exe --help
          ./rizome.exe completion bash > NUL
        else
          ./rizome --help
          ./rizome completion bash > /dev/null
        fi

  sync-test:
    name: Sync Command Test
    runs-on: ubuntu-latest
    needs: [build]
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24.0'

    - name: Build rizome
      run: go build -o rizome ./cmd/rizome

    - name: Test sync dry-run
      run: ./rizome sync --dry-run

    - name: Test actual sync
      run: ./rizome sync

    - name: Verify created files
      run: |
        ls -la *.md
        [ -f CLAUDE.md ] && echo "✓ CLAUDE.md created"
        [ -f QWEN.md ] && echo "✓ QWEN.md created"
        [ -f CURSOR.md ] && echo "✓ CURSOR.md created"
        [ -f GEMINI.md ] && echo "✓ GEMINI.md created"
        [ -f WINDSURF.md ] && echo "✓ WINDSURF.md created"
